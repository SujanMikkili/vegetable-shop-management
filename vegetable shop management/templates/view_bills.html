<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VegShop — View Bills</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #2d6a4f; --green-light: #52b788; --green-pale: #d8f3dc;
            --amber: #e76f00; --cream: #fefae0; --brown: #4a3728;
            --text: #1b1b1b; --muted: #6b6b6b; --white: #ffffff;
            --card-bg: #fffef7; --border: rgba(45,106,79,0.15);
            --danger: #e11d48;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 70% 20%, rgba(225,29,72,0.05) 0%, transparent 40%),
                        radial-gradient(circle at 30% 80%, rgba(45,106,79,0.06) 0%, transparent 40%);
            pointer-events: none; z-index: 0;
        }

        .page-wrapper { max-width: 960px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--green); font-weight: 500; text-decoration: none; font-size: 14px;
            margin-bottom: 32px; padding: 8px 16px; border-radius: 100px;
            background: rgba(45,106,79,0.08); transition: background 0.2s;
        }
        .back-link:hover { background: rgba(45,106,79,0.15); }

        .page-header { margin-bottom: 36px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; color: var(--brown); }
        .page-header p { color: var(--muted); margin-top: 8px; font-size: 15px; }

        .bills-grid { display: flex; flex-direction: column; gap: 20px; }

        .bill-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .bill-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.07); }

        .bill-header {
            padding: 20px 24px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }
        .bill-header:hover { background: rgba(45,106,79,0.02); }
        .bill-header.open { border-color: var(--border); }

        .bill-meta { display: flex; align-items: center; gap: 16px; }
        .bill-id {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem; font-weight: 700; color: var(--brown);
        }
        .bill-date {
            font-size: 13px; color: var(--muted);
        }

        .bill-total {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-weight: 700; color: var(--green);
        }

        .bill-chevron {
            color: var(--muted); font-size: 14px;
            transition: transform 0.2s; margin-left: 12px;
        }
        .bill-header.open .bill-chevron { transform: rotate(180deg); }

        .bill-items { display: none; }
        .bill-items.open { display: block; }

        table { width: 100%; border-collapse: collapse; }
        thead tr { background: rgba(45,106,79,0.04); }
        th { padding: 12px 24px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
        td { padding: 12px 24px; font-size: 14px; color: var(--text); border-top: 1px solid var(--border); }

        .empty-state {
            text-align: center; padding: 80px 24px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px;
        }
        .empty-state .icon { font-size: 3.5rem; display: block; margin-bottom: 16px; }
        .empty-state h2 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .empty-state p { color: var(--muted); font-size: 14px; }

        .loading { text-align: center; padding: 64px; color: var(--muted); font-size: 15px; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <a href="/" class="back-link">← Back to Dashboard</a>

        <div class="page-header">
            <h1>🧾 View Bills</h1>
            <p>Complete billing history with item-level detail</p>
        </div>

        <div class="bills-grid" id="billsList">
            <div class="loading">Loading bills...</div>
        </div>
    </div>

    <script>
        function formatDate(iso) {
            if (!iso) return 'N/A';
            const d = new Date(iso);
            return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function toggleBill(id) {
            const header = document.getElementById(`header-${id}`);
            const items = document.getElementById(`items-${id}`);
            header.classList.toggle('open');
            items.classList.toggle('open');
        }

        async function loadBills() {
            const res = await fetch('/get_bills');
            const bills = await res.json();
            const container = document.getElementById('billsList');

            if (!bills.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">🧾</span>
                        <h2>No bills yet</h2>
                        <p>Generated bills will appear here after checkout.</p>
                    </div>`;
                return;
            }

            container.innerHTML = bills.map(bill => {
                // Fix: items_sold now includes unit field; fallback gracefully if missing
                const itemRows = (bill.items_sold || []).map(item => `
                    <tr>
                        <td><strong>${item.name || '—'}</strong></td>
                        <td>${parseFloat(item.quantity || 0).toFixed(2)} ${item.unit || ''}</td>
                        <td>₹${parseFloat(item.selling_price || 0).toFixed(2)}</td>
                        <td>₹${(parseFloat(item.selling_price || 0) * parseFloat(item.quantity || 0)).toFixed(2)}</td>
                    </tr>`).join('');

                return `
                <div class="bill-card">
                    <div class="bill-header" id="header-${bill.id}" onclick="toggleBill(${bill.id})">
                        <div class="bill-meta">
                            <span class="bill-id">Bill #${bill.id}</span>
                            <span class="bill-date">📅 ${formatDate(bill.date)}</span>
                        </div>
                        <div style="display:flex;align-items:center">
                            <span class="bill-total">₹${parseFloat(bill.total_amount).toFixed(2)}</span>
                            <span class="bill-chevron">▼</span>
                        </div>
                    </div>
                    <div class="bill-items" id="items-${bill.id}">
                        <table>
                            <thead><tr><th>Item</th><th>Quantity</th><th>Unit Price</th><th>Subtotal</th></tr></thead>
                            <tbody>${itemRows}</tbody>
                        </table>
                    </div>
                </div>`;
            }).join('');
        }

        loadBills();
    </script>
</body>
</html>
